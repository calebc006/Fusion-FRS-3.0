<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FR Live</title>
    <link rel="icon" href="../static/images/fusionlogo.png" />
    <link rel="stylesheet" href="../static/css/main.css" />
    <link rel="stylesheet" href="../static/css/taskbar.css" />
    <link rel="stylesheet" href="../static/css/old-layout.css" />
  </head>
  <body>
    <div class="title">FUSION FACIAL RECOGNITION SYSTEM</div>

    <!-- Seatings Menu -->
    <div id="table-menu" style="display: none">
      <div class="menu-header" id="table-menu-header">
        <span>Settings</span>
        <button id="close-menu">×</button>
      </div>
      <div class="seating-options">
        <button id="add-table">Add Table</button>
        <button id="remove-table">Remove Table</button>
        <button id="reset-tables">Reset All Tables</button>
        <div class="lock-toggle">
          <input type="checkbox" id="lock-tables" />
          <label for="lock-tables">Lock Tables (Disable Dragging)</label>
        </div>
      </div>
    </div>
    
    <div class="container">
      <!-- Video feed goes here -->
      <div id="video-container">
        <object id="video-feed" type="image/jpeg">
          <img src="../static/images/default.jpg" alt="default video image" />
        </object>
      </div>
  
      <!-- Detection list goes here -->
      <div class="detection-container">
        <div class="detection-list" id="detection-list"></div>
      </div>
    </div>

    <!-- Logos -->
    <div class="flex-container-logo">
      <img src="../static/images/armylogo.png" />
      <img src="../static/images/11logo.png" />
      <img class="fusion-logo" src="../static/images/fusionlogo.png" />
    </div>

    <!-- Bottom Taskbar -->
    <div class="taskbar-placeholder">
      <div class="taskbar">
        <button id="home-button">Home</button>
      </div>
    </div>

    <script type="module" src="../static/js/oldLayout.js"></script>
    <script type="module" src="../static/js/taskbar.js"></script>
  </body>
</html>
